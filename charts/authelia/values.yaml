---
authelia:
  configMap:
    theme: dark
    server:
      port: 9091
    log:
      level: info
      format: text
    authentication_backend:
      file:
        enabled: true
        path: /config/users.yml
        watch: true
        search:
          email: true
    storage:
      local:
        enabled: true
        path: /app/data/db.sqlite3
    session:
      name: authelia_session
      same_site: lax
      expiration: 1h
      inactivity: 5m
      cookies:
        - domain: danajp.org
          subdomain: auth
    regulation:
      max_retries: 3
      find_time: 2m
      ban_time: 10m
    webauthn:
      disable: false
      enable_passkey_login: true
      attestation_conveyance_preference: indirect
      selection_criteria:
        discoverability: preferred
        user_verification: preferred
    identity_providers:
      oidc:
        enabled: true
        jwks:
          - key_id: default
            algorithm: RS256
            use: sig
            key:
              path: /app/secrets/oidc/private-key.pem
        clients:
          - client_id: gollum-wiki
            client_name: Gollum Wiki
            client_secret: "$plaintext${AUTHELIA_OIDC_GOLLUM_CLIENT_SECRET}"
            public: false
            authorization_policy: one_factor
            require_pkce: true
            pkce_challenge_method: S256
            redirect_uris:
              - https://wiki.danajp.org/oauth2/callback
            scopes:
              - openid
              - profile
              - email
            grant_types:
              - authorization_code
              - refresh_token
            response_types:
              - code
            token_endpoint_auth_method: client_secret_post
            consent_mode: implicit
    access_control:
      default_policy: deny
      rules:
        - domain: auth.danajp.org
          policy: bypass
        - domain: wiki.danajp.org
          policy: one_factor
        - domain: "*.home.danajp.org"
          policy: one_factor
    notifier:
      filesystem:
        enabled: true
        filename: /app/data/notification.txt

  secret:
    existingSecret: authelia

  pod:
    kind: Deployment
    replicas: 1
    extraVolumeMounts:
      - name: data
        mountPath: /app/data
      - name: users-config
        mountPath: /config
      - name: oidc-key
        mountPath: /app/secrets/oidc
        readOnly: true
    extraVolumes:
      - name: data
        persistentVolumeClaim:
          claimName: authelia-data
      - name: users-config
        secret:
          secretName: authelia-users
      - name: oidc-key
        secret:
          secretName: authelia-oidc-key
    env:
      - name: AUTHELIA_OIDC_GOLLUM_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: authelia-oidc-client-secrets
            key: gollum-wiki

  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    certManager: true
    tls:
      enabled: true
      secret: authelia-tls
